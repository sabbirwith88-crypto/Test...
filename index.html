<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Telegram Mini App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 350px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-size: 18px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Telegram App</h2>
  <p>Start click korle interstitial video ads show hobe</p>

  <button onclick="startApp()">START</button>
</div>

<script>
  let adsController;

  function initAds() {
    adsController = new TelegramAdsController();

    adsController.initialize({
      pubId: "1009628",
      appId: "395212"   // 👈 তোমার Interstitial Video ID
    });
  }

  function startApp() {
    if (window.Telegram && Telegram.WebApp) {
      Telegram.WebApp.ready();
    }

    try {
      if (!adsController) initAds();

      // Interstitial video show trigger
      adsController.show();
    } catch (e) {
      console.log("Ads not loaded", e);
    }
  }

  initAds();
</script>

</body>
</html>
