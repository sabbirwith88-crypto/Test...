<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Telegram Mini App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>

  <!-- Ads SDK -->
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 90%;
      max-width: 360px;
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      margin-top: 15px;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Mini App</h2>
  <p>Start click → Interstitial Video Ads</p>

  <button onclick="startApp()">START</button>
  <div class="status" id="status">Waiting...</div>
</div>

<script>
  let adsController = null;

  function setStatus(text) {
    document.getElementById("status").innerText = text;
  }

  // Check Telegram
  function isTelegram() {
    return window.Telegram && window.Telegram.WebApp;
  }

  // Init Ads safely
  function initAds() {
    try {
      if (typeof TelegramAdsController === "undefined") {
        setStatus("❌ Ads SDK not loaded");
        return false;
      }

      adsController = new TelegramAdsController();

      adsController.initialize({
        pubId: "1009628",
        appId: "395212" // Interstitial Video ID
      });

      setStatus("✅ Ads initialized");
      return true;

    } catch (e) {
      console.log(e);
      setStatus("❌ Ads init failed");
      return false;
    }
  }

  // Start button
  function startApp() {

    // 1. Telegram check
    if (!isTelegram()) {
      alert("Open inside Telegram bot WebApp");
      setStatus("❌ Not Telegram");
      return;
    }

    Telegram.WebApp.ready();
    setStatus("✅ Telegram OK");

    // 2. Init ads
    if (!adsController) {
      const ok = initAds();
      if (!ok) return;
    }

    // 3. Show ads
    setTimeout(() => {
      try {
        if (adsController && typeof adsController.show === "function") {
          adsController.show();
          setStatus("🎬 Ad triggered");
        } else {
          setStatus("❌ Ads not available");
        }
      } catch (e) {
        console.log(e);
        setStatus("❌ Ad error");
      }
    }, 800);
  }

  // Auto init
  initAds();
</script>

</body>
</html>
