<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ads Debug</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
</head>

<body style="background:#111;color:#fff;text-align:center;padding-top:50px">

<h2>ADS DEBUG</h2>

<button onclick="testAd()">TEST ADS</button>

<script>
let ads;

function init() {
  console.log("SDK:", typeof TelegramAdsController);

  if (typeof TelegramAdsController === "undefined") {
    alert("SDK NOT LOADED");
    return;
  }

  ads = new TelegramAdsController();

  ads.initialize({
    pubId: "1009628",
    appId: "395212"
  });

  console.log("INIT DONE");
}

function testAd() {
  if (!window.Telegram || !Telegram.WebApp) {
    alert("Not inside Telegram");
    return;
  }

  Telegram.WebApp.ready();

  if (!ads) init();

  setTimeout(() => {
    try {
      console.log("TRY SHOW AD");

      let result = ads.show();

      console.log("RESULT:", result);

    } catch (e) {
      console.log("ERROR:", e);
      alert("ERROR: " + e.message);
    }
  }, 1000);
}

init();
</script>

</body>
</html>
