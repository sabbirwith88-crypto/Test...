<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Telegram Mini App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>

  <!-- RichAds Telegram Script -->
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      width: 90%;
      max-width: 350px;
      padding: 20px;
      background: #1e293b;
      border-radius: 15px;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      width: 100%;
      margin-top: 15px;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Telegram Mini App</h2>
  <p>Start button click korle ads show hobe</p>

  <button onclick="startApp()">START</button>
</div>

<script>
  // Telegram Ads Controller init
  window.TelegramAdsController = new TelegramAdsController();

  window.TelegramAdsController.initialize({
    pubId: "1009628",
    appId: "7202",
  });

  function startApp() {
    // ads trigger (RichAds / Telegram playable)
    try {
      window.TelegramAdsController.show();
    } catch (e) {
      console.log("Ads not ready", e);
    }
  }
</script>

</body>
</html>
